<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting App</title>

    <!-- SOLO Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 10px;
        }

        h1 {
            margin-top: 15px;
            font-size: 1.4rem;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 16px;
            width: 220px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .vote-btn {
            background: #22c55e;
            color: white;
        }

        .results-btn {
            background: #3b82f6;
            color: white;
            margin-top: 15px;
            width: 80%;
            max-width: 300px;
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
        }

        /* RESULTADOS TEXTO */
        #resultsText {
            margin-top: 15px;
            font-size: 1.2rem;
        }

        #winner {
            font-size: 1.5rem;
            font-weight: bold;
            color: #facc15;
            margin-top: 10px;
        }

        /* GRÁFICO */
        .chart-container {
            display: none;
            margin-top: 20px;
            justify-content: center;
        }

        canvas {
            max-width: 300px;
        }
    </style>
</head>

<body>

<h1>Elige al ganador de la ♦ Batalla de Titulares ♦</h1>

<div class="container">

    <div class="card">
        <h2>Camilo Sánchez</h2>
        <img onclick="vote('Camilo Sánchez')" 
             src="{{ url_for('static', filename='images/camilo_sanchez.jpg') }}">
        <button class="vote-btn" onclick="vote('Camilo Sánchez')">Votar</button>
    </div>

    <div class="card">
        <h2>Camilo Pardo</h2>
        <img onclick="vote('Camilo Pardo')" 
             src="{{ url_for('static', filename='images/camilo_pardo.jpg') }}">
        <button class="vote-btn" onclick="vote('Camilo Pardo')">Votar</button>
    </div>

</div>

<div id="msg"></div>

<button class="results-btn" onclick="loadResults()">Ver resultados</button>

<div id="resultsText"></div>
<div id="winner"></div>

<div class="chart-container" id="chartContainer">
    <canvas id="chart"></canvas>
</div>

<script>

let chart;

// VOTAR
function vote(candidate){

    if(document.cookie.includes("voted=true")){
        document.getElementById("msg").innerText = "Ya has votado";
        return;
    }

    fetch("/vote", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({candidate})
    })
    .then(r => r.json())
    .then(d => {

        if(d.error){
            document.getElementById("msg").innerText = d.error;
        } else {
            document.getElementById("msg").innerText = "Voto registrado correctamente";
            document.cookie = "voted=true";
        }

    });
}

// RESULTADOS
function loadResults(){

    fetch("/results")
    .then(r => r.json())
    .then(d => {

        const total = d.total;

        // Mostrar texto claro
        document.getElementById("resultsText").innerHTML = `
            Camilo Sánchez: ${d.a.toFixed(1)}%<br>
            Camilo Pardo: ${d.b.toFixed(1)}%
        `;

        // Mostrar ganador
        if(total > 0){
            const winnerPercent = Math.max(d.a, d.b).toFixed(1);
            document.getElementById("winner").innerText =
                `Ganador: ${d.winner} (${winnerPercent}%)`;
        }

        // Mostrar gráfico
        document.getElementById("chartContainer").style.display = "flex";

        if(chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "bar",  // 🔥 CAMBIO A BARRAS (más estable)
            data: {
                labels: ["Camilo Sánchez", "Camilo Pardo"],
                datasets: [{
                    data: [d.a, d.b],
                    backgroundColor: ["#22c55e", "#3b82f6"]
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            color: "white",
                            callback: val => val + "%"
                        }
                    },
                    x: {
                        ticks: {
                            color: "white"
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

    })
    .catch(() => {
        document.getElementById("msg").innerText = "Error cargando resultados";
    });
}

</script>

</body>
</html>
